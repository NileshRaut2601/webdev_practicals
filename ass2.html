<!-- Creating a survey form that allows users to easily submit their responses. The form will
include different input types such as text fields, checkboxes, and radio buttons, all
designed using HTML for the structure and CSS for styling. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(to right,blue,black);
        }
        .container{
            width:400px;
            margin:auto;
            padding:20px;
            padding-bottom: 10px;
            background-color: rgb(192, 223, 217);
        }
        .section{
            
            padding:10px;
        }
        input[type="text"],[type="email"]{
            padding:7px;
            width:95%;
            font-size:15px;
        }
        textarea{
            width:95%;
            height:100px;
            font-size:15px;


        }
        button{
            width:100%;
            padding:6px;
            background-color: rgb(135, 233, 233);
            border-color:black;
            border-radius:8px;
        }
        label{
            font-weight:bold;
        }
        h2{
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="container">
        <form>
            <h2>Survey Form</h2>
            <div class="section">
                <label>Name:</label><br>
                <input type="text" placeholder="Enter your name" name="Name"><br>
                <label>Email:</label><br>
                <input type="email" placeholder="Enter your Email"><br>
                <div class="section">
                <label>Gender:</label><br>
                <input type="radio" name="gender">Male<br>
                <input type="radio" name="gender">Female<br>
                <input type="radio" name="gender">Other<br>
                 </div>
                 <div class="section">
                <label>Interests:</label><br>
                <input type="checkbox" name="music">Music<br>
                <input type="checkbox" name="technoloy">Technoloy<br>
                <input type="checkbox" name="sport">Sport<br>
                 </div>
                 <div class="Feedback">
                <label>Feedback:</label><br>
                <textarea placeholder="Enter here"></textarea><br>
                </div>
                <div class="section">
                    <button type="submit">Submit</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
